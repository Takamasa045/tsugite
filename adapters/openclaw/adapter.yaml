name: openclaw
kind: cli
class: generation
dry_run_estimate: true
batch: false
credit_estimate:
  per_request: 1
  per_second: 0.2
retry:
  max_attempts: 0
  retryable_exit_codes: []
exit_code_map:
  "0": ok
  "20": transient
  "21": rate_limited
  "40": invalid_request
checks:
  setup:
    - type: environment
      name: bridge:openclaw
      variable: TSUGITE_OPENCLAW_GENERATE_COMMAND
      format: json-command
      remediation:
        default: "Set TSUGITE_OPENCLAW_GENERATE_COMMAND to a JSON command array whose executable is installed, then rerun doctor."
command:
  executable: node
  args: ["adapters/openclaw/generate.mjs"]
  input: stdin-json
