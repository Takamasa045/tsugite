name: kling
kind: cli
dry_run_estimate: true
batch: true
credit_estimate:
  per_request: 1
  per_second: 0.1
retry:
  max_attempts: 2
  retryable_exit_codes: [20, 21]
exit_code_map:
  "0": ok
  "20": transient
  "21": rate_limited
  "40": invalid_request
input_modes:
  text-to-video:
    forbidden_params: [image]
  image-to-video:
    required_params:
      image: non-empty-string
checks:
  setup:
    - type: command
      name: provider:kling
      command: ["kling", "--version"]
      capture_version: true
      remediation:
        default: "Install Kling CLI, then rerun doctor."
    - type: manual
      name: provider-auth:pixverse
      blocking: false
      detail: "Kling direct requests use Kling CLI; authentication and provider connectivity are not contacted by doctor."
      remediation:
        default: "Run `kling who_am_i`; if needed, run `kling login` before Gate 1 approval."
command:
  executable: node
  args: ["adapters/kling/generate.mjs"]
  input: stdin-json
