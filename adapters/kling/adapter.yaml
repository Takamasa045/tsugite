name: kling
kind: cli
dry_run_estimate: true
batch: true
credit_estimate:
  per_request: 1
  per_second: 0.1
retry:
  max_attempts: 2
  retryable_exit_codes: [20, 21]
exit_code_map:
  "0": ok
  "20": transient
  "21": rate_limited
  "40": invalid_request
input_modes:
  text-to-video:
    forbidden_params: [image]
  image-to-video:
    required_params:
      image: non-empty-string
checks:
  setup:
    - type: command
      name: provider:pixverse
      command: ["pixverse", "--version"]
      capture_version: true
      remediation:
        default: "Install the PixVerse CLI with `npm install -g pixverse@latest`, then rerun doctor."
    - type: manual
      name: provider-auth:pixverse
      blocking: false
      detail: "Kling requests use the PixVerse CLI route; authentication and provider connectivity are not contacted by doctor."
      remediation:
        default: "Run `pixverse auth status --json`; if needed, run `pixverse auth login` before Gate 1 approval."
command:
  executable: node
  args: ["adapters/kling/generate.mjs"]
  input: stdin-json
