name: topview
kind: cli
class: generation
dry_run_estimate: true
batch: false
credit_estimate:
  per_request: 0
  per_second: 1
retry:
  max_attempts: 0
  retryable_exit_codes: []
exit_code_map:
  "0": ok
  "20": transient
  "21": rate_limited
  "40": invalid_request
input_modes:
  text-to-video:
    forbidden_params: [image]
    forbidden_fields: [first_frame]
  image-to-video:
    forbidden_params: [image]
    required_fields: [first_frame]
checks:
  setup:
    - type: command
      name: provider:topview-cli
      command: ["node", "adapters/topview/check.mjs"]
      capture_version: true
      remediation:
        default: "Install the TopView skill CLI or set TSUGITE_TOPVIEW_VIDEO_COMMAND to its JSON command array, then rerun doctor."
    - type: manual
      name: provider-auth:topview
      blocking: false
      detail: "Authentication, provider connectivity, and credits are not contacted by doctor."
      remediation:
        default: "Confirm TopView login and available credits before Gate 1 approval."
command:
  executable: node
  args: ["adapters/topview/generate.mjs"]
  input: stdin-json
