name: topview
kind: mcp-agent
class: generation
dry_run_estimate: true
batch: false
credit_estimate:
  per_request: 1
  per_second: 0.2
retry:
  max_attempts: 0
  retryable_exit_codes: []
exit_code_map:
  "0": ok
  "20": transient
  "21": rate_limited
  "40": invalid_request
input_modes:
  text-to-video:
    forbidden_params: [image]
checks:
  setup:
    - type: manual
      name: handoff:topview
      detail: "Tsugite cannot verify the external Topview skill, API access, credentials, or credits from this repository."
      remediation:
        default: "Verify the installed Topview skill and API access with a non-charging check before Gate 1 approval."
