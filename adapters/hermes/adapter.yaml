name: hermes
kind: mcp-agent
class: analysis
dry_run_estimate: false
batch: false
credit_estimate:
  per_request: 0
  per_second: 0
retry:
  max_attempts: 0
  retryable_exit_codes: []
exit_code_map:
  "0": ok
checks:
  setup:
    - type: manual
      name: handoff:hermes
      detail: "Tsugite cannot verify the external Hermes runtime, MCP surface, or provider credentials from this repository."
      remediation:
        default: "Verify Hermes runtime and MCP connectivity before using the analysis handoff."
