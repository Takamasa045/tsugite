name: Desktop

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: desktop-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package-smoke:
    name: ${{ matrix.name }} developer-only package smoke
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Arm64
            os: macos-15
          - name: Windows x64
            os: windows-2022
    env:
      # Developer smoke runs must never require or discover signing identities.
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            apps/workflow-viewer/package-lock.json
            apps/desktop/package-lock.json
      - name: Install runtime and Desktop dependencies
        run: |
          npm ci
          npm --prefix apps/workflow-viewer ci
          npm --prefix apps/desktop ci
      - name: Audit root dependencies
        run: npm run security:audit
      - name: Audit Desktop dependencies
        run: npm --prefix apps/desktop run security:audit
      - name: Test Desktop package boundary
        run: npm --prefix apps/desktop test
      - name: Build unsigned app for local verification
        run: npm --prefix apps/desktop run package
      - name: Verify packaged workspace recovery
        run: npm --prefix apps/desktop run test:packaged-workspace
