schema_version: 1
kind: tsugite-template
id: blog-dialogue-60s
name: ブログ掛け合い 60秒
summary: ブログ記事を初心者役と解説役の会話で伝える、60秒の横型解説動画です。
category: 記事を動画化
use_cases:
  - ブログ記事
  - 初心者向け解説
output:
  duration:
    mode: fixed
    min_seconds: 60
    max_seconds: 60
    label: 60秒
  aspect_ratios:
    - "16:9"
  speaker_count: 2
required_inputs:
  - type: text
    label: 記事本文と出典
    required: true
  - type: image
    label: 2人分のキャラクター画像
    required: true
tags:
  - 掛け合い
  - 記事
  - 60秒
audio:
  narration: optional
  bgm: optional
  silent_draft: true
  notes: 音声とBGMは任意。未指定時は字幕付き無音ドラフトになります。
status: stable
distribution: local-only
