schema_version: 1
kind: tsugite-template
id: neon-dialogue
name: ネオン掛け合い
summary: ネオン調の中央演出と2人の会話を組み合わせた、尺を調整できる横型動画です。
category: 2人掛け合い
use_cases:
  - 対談ダイジェスト
  - SNS解説
output:
  duration:
    mode: variable
    min_seconds: 1
    max_seconds: 3600
    label: 可変
  aspect_ratios:
    - "16:9"
  speaker_count: 2
required_inputs:
  - type: data
    label: 時間付き会話台本
    required: true
  - type: image
    label: 2人分のキャラクター画像
    required: true
tags:
  - ネオン
  - 掛け合い
  - SNS
audio:
  narration: optional
  bgm: optional
  silent_draft: true
  notes: 音声とBGMは任意。未指定時は無音ドラフトとして扱います。
status: experimental
distribution: local-only
