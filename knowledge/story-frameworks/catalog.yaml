principles:
  - id: one-shot-one-role
    category: shot-design
    instruction: 1カットに一つの主要な情報・感情・動作だけを割り当てる。
    rationale: カットの役割が明確になり、生成指示と編集判断を分離しやすい。
    source_ids: []
  - id: start-end-state
    category: shot-design
    instruction: 各カットに開始状態、可視の変化、終了状態を書く。
    rationale: AI生成クリップでも時間変化と接続点を検証できる。
    source_ids: []
  - id: setup-payoff
    category: story
    instruction: 重要な結末や変化には前段の仕込みまたは予兆を置く。
    rationale: 山場を偶然ではなく必然として受け取れるようにする。
    source_ids: []
  - id: escalation
    category: story
    instruction: 展開ごとに情報、障害、感情、視覚変化のいずれかを一段上げる。
    rationale: 同じ強度の反復による中だるみを防ぐ。
    source_ids: []
  - id: screen-direction
    category: continuity
    instruction: 会話や移動の左右関係を保ち、軸を越える場合は意図と橋渡しカットを設ける。
    rationale: 観客が空間関係を見失うのを防ぐ。
    source_ids: [screen-direction, continuity-editing]
  - id: eyeline-match
    category: continuity
    instruction: 視線の方向と次に見せる対象の位置関係を一致させる。
    rationale: 別々に生成したショット間にも知覚上の因果を作る。
    source_ids: [continuity-editing]
  - id: motivated-cut
    category: editing
    instruction: 動作、視線、意味の変化、音の打点のいずれかを根拠にカットする。
    rationale: 切り替えを装飾ではなく物語上の判断にする。
    source_ids: [continuity-editing]
  - id: shot-size-progression
    category: shot-design
    instruction: Wideで関係を示し、Mediumで行動、Close-upで感情や証拠を強調する。
    rationale: 画角の変化に情報階層と感情の強弱を持たせる。
    source_ids: []
  - id: audio-leads-picture
    category: sound
    instruction: 必要に応じてJカットやLカットで音と画の切替時点をずらす。
    rationale: 次の場面を予告し、会話や場面転換を滑らかにする。
    source_ids: [split-edits]
  - id: silence-as-emphasis
    category: sound
    instruction: 山場や意味の転換前では、音を足すだけでなく短い無音も候補にする。
    rationale: コントラストによって次の言葉や画を強調できる。
    source_ids: []
  - id: rule-of-thirds
    category: shot-design
    instruction: 主題を三分割線や交点へ置き、余白に視線や移動の方向を受ける。
    rationale: 主題と環境の関係を保ちながら視線を誘導できる。
    source_ids: [rule-of-thirds, visual-composition]
  - id: leading-lines
    category: shot-design
    instruction: 道、影、建築線、視線などを焦点へ向かう導線として使う。
    rationale: 画面内の読む順序と奥行きを作る。
    source_ids: [visual-composition]
  - id: look-room
    category: shot-design
    instruction: 人物の視線や移動方向の先に意図的な空間を残す。
    rationale: 圧迫感、期待、不在の対象を余白で制御できる。
    source_ids: [visual-composition]
  - id: headroom
    category: shot-design
    instruction: 頭上余白をショットサイズ間で一貫させ、意図のない窮屈さを避ける。
    rationale: 人物ショットを安定させ、編集時の画面ジャンプを減らす。
    source_ids: []
  - id: depth-layers
    category: shot-design
    instruction: 前景・中景・背景に役割を持たせ、平面的な画を避ける。
    rationale: 空間、規模、視線誘導を一枚の画で伝えられる。
    source_ids: [visual-composition]
  - id: symmetry-intent
    category: shot-design
    instruction: 対称構図は秩序や儀式性、崩れは不安や変化を示すため意図的に使う。
    rationale: 構図そのものを感情変化の信号にできる。
    source_ids: [visual-composition]
  - id: visual-hierarchy
    category: shot-design
    instruction: 明暗、サイズ、色、焦点、動きの優先順位を一つ決める。
    rationale: 観客が最初に見る対象を制御し、情報過多を防ぐ。
    source_ids: [visual-composition]
  - id: color-motif
    category: story
    instruction: 色を人物、状態、テーマに結び付け、変化時だけ規則を変える。
    rationale: 台詞なしで反復と変化を認識させられる。
    source_ids: []
  - id: thirty-degree-change
    category: continuity
    instruction: 同じ被写体へ切るときは画角またはサイズを十分変え、意図しないジャンプを避ける。
    rationale: 同一場面内の切替を明確な視点変化として読ませる。
    source_ids: [continuity-editing]
  - id: match-on-action
    category: continuity
    instruction: 動作の途中で切り、次のショットで同じ方向と位相の動作を継続する。
    rationale: 空間や撮影テイクが異なっても連続した一動作に見せられる。
    source_ids: [continuity-editing]
  - id: cutaway-bridge
    category: continuity
    instruction: 手元、反応、環境などのカットアウェイを時間圧縮や軸変更の橋として使う。
    rationale: 不連続を隠すだけでなく、情報を追加しながら接続できる。
    source_ids: [screen-direction, continuity-editing]
  - id: establishing-reestablishing
    category: continuity
    instruction: 場面冒頭で空間関係を示し、配置が変わったら再提示する。
    rationale: Close-upが続いても観客が場所と人物関係を追える。
    source_ids: [continuity-editing]
  - id: shot-reverse-shot
    category: continuity
    instruction: 会話では視線、肩越しの向き、サイズ差を対応させる。
    rationale: 別撮りや別生成でも対話している空間を成立させる。
    source_ids: [screen-direction, continuity-editing]
  - id: cut-on-gaze
    category: editing
    instruction: 人物が見る動作の直後に対象を示し、必要なら反応へ戻る。
    rationale: 視線を因果として使い、説明台詞を減らせる。
    source_ids: [continuity-editing]
  - id: graphic-match
    category: editing
    instruction: 形、方向、色、動きが似るショットを接続して場面を飛び越える。
    rationale: 時空間の変化に視覚的な連続性と意味を持たせる。
    source_ids: []
  - id: pace-contrast
    category: editing
    instruction: 同じカット長を続けず、速い連続と長い保持を目的に応じて対比する。
    rationale: 速度そのものではなく速度変化で注意と感情を作る。
    source_ids: []
  - id: hold-before-after
    category: editing
    instruction: 重要な動作や台詞の前後に短い保持を残す。
    rationale: 期待と反応の時間を作り、編集とトランジションの余地も確保する。
    source_ids: []
  - id: room-tone
    category: sound
    instruction: 場所ごとの環境音を連続して敷き、無音の継ぎ目を避ける。
    rationale: 別テイクや別ショットの音を同じ空間として結び付ける。
    source_ids: []
  - id: dialogue-ducking
    category: sound
    instruction: 台詞中はBGMと効果音を下げ、言葉が終わった後に戻す。
    rationale: 音量競合を避け、感情の勢いを保ったまま明瞭度を上げる。
    source_ids: []
  - id: sonic-motif
    category: sound
    instruction: 人物、場所、概念に短い音型を結び付け、変化に合わせて変奏する。
    rationale: 画面外でもテーマの回帰や予兆を示せる。
    source_ids: []
  - id: continuity-anchor
    category: continuity
    instruction: AI生成ショット間で人物特徴、衣装、持ち物、光向き、画面方向の固定項目を再利用する。
    rationale: モデルごとの揺れを抑え、別クリップを同一シーンとして接続しやすくする。
    source_ids: []
  - id: transition-handles
    category: editing
    instruction: 各生成クリップの開始と終了に編集用の安定フレームまたは完了動作を確保する。
    rationale: 黒フレーム、急停止、意味の途中切れを避けて接続点を選べる。
    source_ids: []
  - id: camera-motivation
    category: shot-design
    instruction: カメラ移動は被写体の動き、情報開示、感情変化のいずれかに反応させる。
    rationale: 無目的な浮遊カメラを避け、動きに物語上の意味を持たせる。
    source_ids: []
  - id: one-motion-per-clip
    category: shot-design
    instruction: 一つの生成クリップでは主動作と主カメラ移動をそれぞれ一つに絞る。
    rationale: AI生成の破綻を減らし、結果を編集可能な単位に保つ。
    source_ids: []
  - id: reference-ownership
    category: continuity
    instruction: 参照画像には外見と空間、テキストには動作と時間変化を主に担当させる。
    rationale: 同じ情報を競合する指示で二重定義するのを避ける。
    source_ids: []
safety_notes:
  - 構成法は正解ではなく仮説として扱い、目的・尺・媒体・視聴者心理に合わせて主軸と補助線を選ぶ。
  - 既存IP、特定作品、特定作家の固有表現や具体的展開をコピーせず、構造上の役割だけを抽象化する。
  - カタログは提案知識であり、生成・編集・外部APIの実行能力を意味しない。
