slug: multi-analysis-adapters
run_id: multi-analysis-adapters-run
manifest: ../manifests/render-local.valid.json
dist_dir: dist
edit:
  backend: remotion
analysis:
  adapter: mock-cli-analysis
  requests:
    - id: transcript
      adapter: mock-cli-transcription
      output: captions
      source_clip_id: render-001
      params: {}
    - id: silence
      output: cut_points
      source_clip_id: render-001
      params: {}
    - id: chapters
      adapter: mock-cli-transcription
      output: chapters
      source_clip_id: render-001
      depends_on: [transcript]
      params: {}
