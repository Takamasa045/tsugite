name: mock-cli-transcription
kind: cli
class: analysis
offline: true
outputs: [captions, chapters]
dry_run_estimate: true
batch: true
credit_estimate:
  per_request: 0
  per_second: 0
retry:
  max_attempts: 0
  retryable_exit_codes: []
exit_code_map:
  "0": ok
checks:
  setup:
    - type: command
      name: tool:mock-local-stt
      command: ["node", "--version"]
      capture_version: true
      remediation:
        default: "Install the selected local transcription CLI."
command:
  executable: node
  args: ["fixtures/adapters/mock-cli-analysis/analyze.mjs"]
  input: stdin-json
